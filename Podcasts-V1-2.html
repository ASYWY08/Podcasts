<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Explorer - Liquid Glass</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(45deg, #1a0b2e, #4b1d52, #112d4e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            will-change: transform;
        }
        .blob-1 { top: -100px; left: -100px; width: 400px; height: 400px; background: #ff2a5f; }
        .blob-2 { bottom: -100px; right: -100px; width: 500px; height: 500px; background: #00e5ff; }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
            border-radius: 0 0 24px 24px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            flex-grow: 1;
            max-width: 500px;
            margin: 0 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.2);
        }

        button {
            padding: 12px 24px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* --- 手機版響應式修正 --- */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 15px;
                gap: 15px;
            }
            .search-container {
                width: 100%;
                margin: 0;
            }
            input[type="text"] {
                font-size: 16px; /* 確保 iOS 上點擊不自動放大 */
            }
        }
        /* ----------------------- */

        main {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        .card {
            border-radius: 24px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card h3 {
            margin: 15px 0 5px 0;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card p.author {
            margin: 0;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }

        .card p.date {
            margin: 8px 0 0 0;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(0,0,0,0.2);
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            align-self: center;
        }

        .favorite-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            font-size: 20px;
            padding: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: transform 0.2s;
        }

        .favorite-btn:hover {
            transform: scale(1.1);
        }

        .favorite-btn.active {
            color: gold;
        }

        #detailModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #detailModal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            width: 90%;
            max-width: 660px;
            border-radius: 24px;
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .close-btn {
            position: absolute;
            top: -15px;
            right: -15px;
            background: rgba(255, 42, 95, 0.9);
            backdrop-filter: blur(8px);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: rgba(255, 42, 95, 1);
            transform: scale(1.1);
        }

        #playerContainer {
            width: 100%;
            height: 430px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: rgba(0,0,0,0.2);
        }

        #playerContainer iframe {
            width: 100%;
            height: 450px;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header class="glass">
        <h2>Podcasts</h2>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="輸入 Podcast 名稱、類型或地區..." onkeypress="handleKeyPress(event)">
            <button onclick="searchPodcasts()">搜尋</button>
        </div>
        <button onclick="toggleFavoritesView()" id="viewFavBtn">⭐ 顯示收藏</button>
    </header>

    <main id="podcastGrid"></main>

    <div id="detailModal">
        <div class="modal-content glass">
            <button class="close-btn" onclick="closeModal()">
                <svg width="16" height="16" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 1L13 13M1 13L13 1" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </button>
            <div id="playerContainer">
                </div>
        </div>
    </div>

    <script>
        let currentPodcasts = [];
        let isShowingFavorites = false;
        let favorites = JSON.parse(localStorage.getItem('podcastFavorites')) || {};

        window.onload = () => searchPodcasts('technology');

        function handleKeyPress(e) {
            if (e.key === 'Enter') searchPodcasts();
        }

        async function searchPodcasts(term = null) {
            const query = term || document.getElementById('searchInput').value || 'podcast';
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=podcast&limit=30`;
            
            document.getElementById('podcastGrid').innerHTML = '<p style="text-align:center; width:100%;">正在載入資料中...</p>';
            isShowingFavorites = false;
            document.getElementById('viewFavBtn').innerText = '⭐ 顯示收藏';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Direct network error");
                const data = await response.json();
                processResults(data.results);
            } catch (error) {
                try {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                    const proxyResponse = await fetch(proxyUrl);
                    const data = await proxyResponse.json();
                    processResults(data.results);
                } catch (proxyError) {
                    document.getElementById('podcastGrid').innerHTML = '<p style="text-align:center; width:100%; color:#ff2a5f;">網路連線受阻，請檢查網路狀態。</p>';
                }
            }
        }

        function processResults(results) {
            currentPodcasts = results.sort((a, b) => new Date(b.releaseDate) - new Date(a.releaseDate));
            renderPodcasts(currentPodcasts);
        }

        function renderPodcasts(podcasts) {
            const grid = document.getElementById('podcastGrid');
            grid.innerHTML = '';

            if (podcasts.length === 0) {
                grid.innerHTML = '<p style="text-align:center; width:100%;">找不到相關的 Podcast。</p>';
                return;
            }

            podcasts.forEach(podcast => {
                const isFav = !!favorites[podcast.collectionId];
                const dateString = new Date(podcast.releaseDate).toLocaleDateString();

                const card = document.createElement('div');
                card.className = 'card glass';
                card.innerHTML = `
                    <button class="favorite-btn ${isFav ? 'active' : ''}" 
                            onclick="toggleFavorite(event, ${podcast.collectionId})">
                        ${isFav ? '⭐' : '☆'}
                    </button>
                    <img src="${podcast.artworkUrl600}" alt="Cover" loading="lazy">
                    <h3>${podcast.collectionName}</h3>
                    <p class="author">${podcast.artistName}</p>
                    <p class="date">📅 ${dateString}</p>
                `;
                card.onclick = () => openModal(podcast.collectionId);
                grid.appendChild(card);
            });
        }

        function toggleFavorite(event, id) {
            event.stopPropagation(); 
            if (favorites[id]) {
                delete favorites[id];
            } else {
                const podcast = currentPodcasts.find(p => p.collectionId === id) || Object.values(favorites).find(p => p.collectionId === id);
                if (podcast) favorites[id] = podcast;
            }
            localStorage.setItem('podcastFavorites', JSON.stringify(favorites));

            if (isShowingFavorites) {
                const sortedFavorites = Object.values(favorites).sort((a, b) => new Date(b.releaseDate) - new Date(a.releaseDate));
                renderPodcasts(sortedFavorites);
            } else {
                renderPodcasts(currentPodcasts);
            }
        }

        function toggleFavoritesView() {
            isShowingFavorites = !isShowingFavorites;
            const btn = document.getElementById('viewFavBtn');
            
            if (isShowingFavorites) {
                btn.innerText = '🔍 返回搜尋';
                const sortedFavorites = Object.values(favorites).sort((a, b) => new Date(b.releaseDate) - new Date(a.releaseDate));
                renderPodcasts(sortedFavorites);
            } else {
                btn.innerText = '⭐ 顯示收藏';
                searchPodcasts(document.getElementById('searchInput').value);
            }
        }

        function openModal(collectionId) {
            const playerContainer = document.getElementById('playerContainer');
            playerContainer.innerHTML = `
                <iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" 
                        sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" 
                        src="https://embed.podcasts.apple.com/hk/podcast/id${collectionId}">
                </iframe>
            `;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.getElementById('playerContainer').innerHTML = '';
        }

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
